version: "3.9"

services:

  service-inference:
    build: ./services/service-inference
    ports:
      - "8001:8000"
    environment:
      - MODEL_NAME=Qwen/Qwen2.5-7B-Instruct
    volumes:
      - ../models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  service-tts:
    build: ./services/service-tts
    ports:
      - "8002:8000"
    volumes:
      - ../models:/app/models
      - ../data/tts:/app/data/tts

  service-rag:
    build: ./services/service-rag
    ports:
      - "8003:8000"
    environment:
      - INFERENCE_URL=http://service-inference:8000
      - TTS_URL=http://service-tts:8000
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - service-inference
      - service-tts
      - qdrant

  # service-vision:  # Uncomment when ready
  #   build: ./services/service-vision
  #   ports:
  #     - "8004:8000"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
