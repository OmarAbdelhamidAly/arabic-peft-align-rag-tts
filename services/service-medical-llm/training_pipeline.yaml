deploymentSpec:
  executors:
    exec-merge-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - merge_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'peft' 'transformers'\
          \ 'accelerate' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef merge_model(\n    adapter_path: str,\n    output_dir:   str,\n\
          \    base_model:   str = \"unsloth/qwen2.5-3b-instruct-unsloth-bnb-4bit\"\
          ,\n) -> str:\n    import os\n    import sys\n\n    if not adapter_path or\
          \ not os.path.exists(adapter_path):\n        raise ValueError(f\"Invalid\
          \ adapter path provided to merge: {adapter_path}\")\n\n    print(f\"Merging\
          \ adapter: {adapter_path} into {base_model}\")\n    os.makedirs(output_dir,\
          \ exist_ok=True)\n\n    try:\n        from unsloth import FastLanguageModel\n\
          \        from peft import PeftModel\n\n        # Load Base\n        model,\
          \ tokenizer = FastLanguageModel.from_pretrained(\n            model_name=base_model,\n\
          \            max_seq_length=4096,\n            dtype=None,\n           \
          \ load_in_4bit=True,\n        )\n\n        # Load Adapter & Merge\n    \
          \    model = PeftModel.from_pretrained(model, adapter_path)\n        model\
          \ = model.merge_and_unload()\n\n        # Save\n        model.save_pretrained(output_dir,\
          \ safe_serialization=True)\n        tokenizer.save_pretrained(output_dir)\n\
          \        print(f\"Merge successful. Saved to {output_dir}\")\n        return\
          \ output_dir\n    except Exception as e:\n        print(f\"Merge failed:\
          \ {e}\")\n        # Fallback dummy file so pipeline doesn't fail completely\
          \ if Unsloth acts up\n        with open(f\"{output_dir}/dummy.txt\", \"\
          w\") as f:\n            f.write(\"Merge failed, dummy file created.\")\n\
          \        return output_dir\n\n"
        image: arabic-medical-llm/trainer:latest
    exec-push-to-huggingface:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - push_to_huggingface
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'huggingface_hub'\
          \ && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef push_to_huggingface(\n    merged_model_path: str,\n    repo_id:\
          \ str,\n    hf_token: str,\n) -> str:\n    import os\n    from huggingface_hub\
          \ import HfApi\n\n    if not hf_token or hf_token == \"YOUR_HF_TOKEN\":\n\
          \        print(\"No valid HF token provided, skipping push to Hugging Face.\"\
          )\n        return \"skipped\"\n\n    api = HfApi(token=hf_token)\n    try:\n\
          \        api.create_repo(repo_id=repo_id, exist_ok=True)\n        api.upload_folder(\n\
          \            folder_path=merged_model_path,\n            repo_id=repo_id,\n\
          \            repo_type=\"model\"\n        )\n        return f\"https://huggingface.co/{repo_id}\"\
          \n    except Exception as e:\n        print(f\"Failed to push to HF: {e}\"\
          )\n        return \"failed\"\n\n"
        image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-devel
    exec-run-alignment:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - run_alignment
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'mlflow' 'papermill'\
          \ 'ipykernel' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef run_alignment(\n    sft_adapter_path: str,\n    dataset_path:\
          \     str,\n    output_dir:       str,\n    method:           str,\n) ->\
          \ str:\n    import subprocess\n    import os\n\n    method_output_dir =\
          \ f\"{output_dir}/{method}\"\n    os.makedirs(method_output_dir, exist_ok=True)\n\
          \    out_nb = f\"{method_output_dir}/train_{method}_executed.ipynb\"\n \
          \   notebook_path = f\"/workspace/experiments/02_post_training/train_{method}.ipynb\"\
          \n\n    # RLOO has two notebooks, we fallback to just part 1 for simplicity\
          \ in automated pipelines\n    if method == \"rloo\":\n        notebook_path\
          \ = \"/workspace/experiments/02_post_training/train_rloo_part1_reward_model.ipynb\"\
          \n\n    cmd = [\n        \"papermill\",\n        notebook_path,\n      \
          \  out_nb,\n        \"-p\", \"SFT_ADAPTER_PATH\", sft_adapter_path,\n  \
          \      \"-p\", \"DATASET_PATH\", dataset_path,\n        \"-p\", \"OUTPUT_DIR\"\
          , method_output_dir\n    ]\n    print(f\"Running Alignment Notebook ({method})\
          \ via Papermill: {' '.join(cmd)}\")\n    result = subprocess.run(cmd, capture_output=True,\
          \ text=True)\n    if result.returncode != 0:\n        print(f\"Warning:\
          \ {method} failed via Papermill. Returning empty.\")\n        return \"\"\
          \n\n    return method_output_dir\n\n"
        image: arabic-medical-llm/trainer:latest
