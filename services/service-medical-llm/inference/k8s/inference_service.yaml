# KServe InferenceService — Arabic Medical LLM (SimPO-aligned)
# ─────────────────────────────────────────────────────────────
# Model:  OmarAbdelhamid/arabic-medical-qwen2-simpo
#         (Qwen2.5-3B, SimPO-aligned, merged 16-bit)
# Runtime: vLLM v0.6.3 — OpenAI-compatible API on port 8080
# Mode:   RawDeployment (no Istio / no Knative required)
#
# Prerequisites:
#   1. KServe installed:
#        kubectl apply -f https://github.com/kserve/kserve/releases/download/v0.12.0/kserve.yaml
#   2. HuggingFace token secret (for private repo):
#        kubectl create secret generic hf-secret \
#          --from-literal=HF_TOKEN=hf_xxxx \
#          -n kserve-inference
#
# Apply:
#   kubectl apply -f inference_service.yaml -n kserve-inference
# ─────────────────────────────────────────────────────────────

# ─── Namespace ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: kserve-inference
  # NOTE: istio-injection removed — using RawDeployment mode (no Istio needed)
---
# ─── ServiceAccount ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-sa
  namespace: kserve-inference
---
# ─── ClusterServingRuntime (vLLM v0.6.3) ────────────────────────────────────
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: vllm-runtime
spec:
  annotations:
    prometheus.kserve.io/port: "8080"
    prometheus.kserve.io/path: "/metrics"
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: true
  protocolVersions:
    - v2
    - grpc-v2
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:v0.6.3   # upgraded from v0.4.3
      command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
        - --max-model-len=$(MAX_MODEL_LEN)
        - --max-num-seqs=$(MAX_NUM_SEQS)
        - --dtype=bfloat16
        - --disable-log-requests
      env:
        - name: MAX_MODEL_LEN
          value: "4096"
        - name: MAX_NUM_SEQS
          value: "4"
        # If model is private on HuggingFace:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
              optional: true   # won't fail if secret doesn't exist (public model)
      ports:
        - name: http1
          containerPort: 8080
          protocol: TCP
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 90
        periodSeconds: 10
        timeoutSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 150
        periodSeconds: 20
      resources:
        requests:
          cpu: "2"
          memory: "16Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: "24Gi"
          nvidia.com/gpu: "1"
---
# ─── InferenceService ────────────────────────────────────────────────────────
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: arabic-medical-llm
  namespace: kserve-inference
  labels:
    app: arabic-medical-llm
    version: "1.0"
    domain: medical
    language: arabic
    alignment: simpo
  annotations:
    # RawDeployment: uses K8s HPA instead of Knative autoscaling
    serving.kserve.io/deploymentMode: "RawDeployment"
spec:
  predictor:
    serviceAccountName: kserve-sa
    minReplicas: 1
    maxReplicas: 3
    model:
      modelFormat:
        name: huggingface
        version: "1"
      runtime: vllm-runtime
      # ✅ Pull directly from HuggingFace Hub (no PVC needed)
      storageUri: "hf://OmarAbdelhamid/arabic-medical-qwen2-simpo"
      resources:
        requests:
          cpu: "2"
          memory: "16Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: "24Gi"
          nvidia.com/gpu: "1"
