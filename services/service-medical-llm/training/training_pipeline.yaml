      run-sft:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-sft
        dependentTasks:
        - validate-dataset
        inputs:
          parameters:
            base_model:
              componentInputParameter: base_model
            dataset_path:
              componentInputParameter: dataset_path
            output_dir:
              componentInputParameter: sft_output_dir
        taskInfo:
          name: run-sft
      select-best-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-select-best-model
        dependentTasks:
        - run-alignment
        - run-alignment-2
        - run-alignment-3
        - run-alignment-4
        - run-alignment-5
        - run-alignment-6
        inputs:
          parameters:
            dpo_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-alignment
            ipo_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-alignment-2
            kto_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-alignment-3
            orpo_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-alignment-4
            rloo_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-alignment-6
            simpo_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-alignment-5
        taskInfo:
          name: select-best-model
      validate-dataset:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-validate-dataset
        inputs:
          parameters:
            dataset_path:
              componentInputParameter: dataset_path
        taskInfo:
          name: validate-dataset
  inputDefinitions:
    parameters:
      alignment_output:
        defaultValue: /outputs/alignments
        isOptional: true
        parameterType: STRING
      base_model:
        defaultValue: unsloth/qwen2.5-3b-instruct-unsloth-bnb-4bit
        isOptional: true
        parameterType: STRING
      dataset_path:
        defaultValue: /data/raw/alignment
        isOptional: true
        parameterType: STRING
      hf_repo_id:
        defaultValue: YourUsername/Arabic-Medical-LLM-Qwen-3B
        isOptional: true
        parameterType: STRING
      hf_token:
        defaultValue: YOUR_HF_TOKEN
        isOptional: true
        parameterType: STRING
      merged_output_dir:
        defaultValue: /outputs/merged_model_16bit
        isOptional: true
        parameterType: STRING
      sft_output_dir:
        defaultValue: /outputs/sft_adapter
        isOptional: true
        parameterType: STRING
  outputDefinitions:
    artifacts:
      run-alignment-2-metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
      run-alignment-3-metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
      run-alignment-4-metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
      run-alignment-5-metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
      run-alignment-6-metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
      run-alignment-metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
      run-sft-metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
