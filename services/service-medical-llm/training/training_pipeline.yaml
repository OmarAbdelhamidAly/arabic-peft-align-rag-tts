pipelineInfo:
  description: 'E2E Pipeline: SFT -> Parallel Alignments -> Select Best -> Merge ->
    Push to HF'
  name: arabic-medical-llm-training-parallel
root:
  dag:
    outputs:
      artifacts:
        run-alignment-2-metrics:
          artifactSelectors:
          - outputArtifactKey: metrics
            producerSubtask: run-alignment-2
        run-alignment-3-metrics:
          artifactSelectors:
          - outputArtifactKey: metrics
            producerSubtask: run-alignment-3
        run-alignment-4-metrics:
          artifactSelectors:
          - outputArtifactKey: metrics
            producerSubtask: run-alignment-4
        run-alignment-5-metrics:
          artifactSelectors:
          - outputArtifactKey: metrics
            producerSubtask: run-alignment-5
        run-alignment-6-metrics:
          artifactSelectors:
          - outputArtifactKey: metrics
            producerSubtask: run-alignment-6
        run-alignment-metrics:
          artifactSelectors:
          - outputArtifactKey: metrics
            producerSubtask: run-alignment
        run-sft-metrics:
          artifactSelectors:
          - outputArtifactKey: metrics
            producerSubtask: run-sft
    tasks:
      merge-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-merge-model
        dependentTasks:
        - select-best-model
        inputs:
          parameters:
            adapter_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: select-best-model
            output_dir:
              componentInputParameter: merged_output_dir
        taskInfo:
          name: merge-model
      push-to-huggingface:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-push-to-huggingface
        dependentTasks:
        - merge-model
        inputs:
          parameters:
            hf_token:
              componentInputParameter: hf_token
            merged_model_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: merge-model
            repo_id:
              componentInputParameter: hf_repo_id
        taskInfo:
          name: push-to-huggingface
      run-alignment:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-alignment
        dependentTasks:
        - run-sft
        inputs:
          parameters:
            dataset_path:
              componentInputParameter: dataset_path
            method:
              runtimeValue:
                constant: dpo
            output_dir:
              componentInputParameter: alignment_output
            sft_adapter_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-sft
        taskInfo:
          name: run-alignment
      run-alignment-2:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-alignment-2
        dependentTasks:
        - run-sft
        inputs:
          parameters:
            dataset_path:
              componentInputParameter: dataset_path
            method:
              runtimeValue:
                constant: ipo
            output_dir:
              componentInputParameter: alignment_output
            sft_adapter_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-sft
        taskInfo:
          name: run-alignment-2
      run-alignment-3:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-alignment-3
        dependentTasks:
        - run-sft
        inputs:
          parameters:
            dataset_path:
              componentInputParameter: dataset_path
            method:
              runtimeValue:
                constant: kto
            output_dir:
              componentInputParameter: alignment_output
            sft_adapter_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-sft
        taskInfo:
          name: run-alignment-3
      run-alignment-4:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-alignment-4
        dependentTasks:
        - run-sft
        inputs:
          parameters:
            dataset_path:
              componentInputParameter: dataset_path
            method:
              runtimeValue:
                constant: orpo
            output_dir:
              componentInputParameter: alignment_output
            sft_adapter_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-sft
        taskInfo:
          name: run-alignment-4
      run-alignment-5:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-alignment-5
        dependentTasks:
        - run-sft
        inputs:
          parameters:
            dataset_path:
              componentInputParameter: dataset_path
            method:
              runtimeValue:
                constant: simpo
            output_dir:
              componentInputParameter: alignment_output
            sft_adapter_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: run-sft
        taskInfo:
          name: run-alignment-5
      run-alignment-6:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-alignment-6
        dependentTasks:
        - run-sft
        inputs:
