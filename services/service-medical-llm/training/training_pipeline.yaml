deploymentSpec:
  executors:
    exec-merge-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - merge_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef merge_model(\n    adapter_path: str,\n    output_dir:   str,\n\
          \    save_method:  str = \"merged_16bit\",\n) -> str:\n    import subprocess,\
          \ sys\n\n    if not adapter_path:\n        raise ValueError(\"No valid adapter\
          \ path provided to merge.\")\n\n    cmd = [\n        sys.executable, \"\
          -m\", \"app.interfaces.cli.main\", \"merge\",\n        \"--adapter-path\"\
          , adapter_path,\n        \"--output-dir\", output_dir,\n        \"--save-method\"\
          , save_method,\n    ]\n    result = subprocess.run(cmd, capture_output=True,\
          \ text=True)\n    if result.returncode != 0:\n        raise RuntimeError(f\"\
          Merge failed:\\n{result.stderr}\")\n\n    return output_dir\n\n"
        image: arabic-medical-llm/trainer:latest
    exec-push-to-huggingface:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - push_to_huggingface
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'huggingface_hub'\
          \ && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef push_to_huggingface(\n    merged_model_path: str,\n    repo_id:\
          \ str,\n    hf_token: str,\n) -> str:\n    import os\n    from huggingface_hub\
          \ import HfApi\n\n    if not hf_token or hf_token == \"YOUR_HF_TOKEN\":\n\
          \        print(\"No valid HF token provided, skipping push to Hugging Face.\"\
          )\n        return \"skipped\"\n\n    api = HfApi(token=hf_token)\n    try:\n\
          \        api.create_repo(repo_id=repo_id, exist_ok=True)\n        api.upload_folder(\n\
          \            folder_path=merged_model_path,\n            repo_id=repo_id,\n\
          \            repo_type=\"model\"\n        )\n        print(f\"[OK] Model\
          \ pushed to Hugging Face: https://huggingface.co/{repo_id}\")\n        return\
          \ f\"https://huggingface.co/{repo_id}\"\n    except Exception as e:\n  \
          \      print(f\"Failed to push to HF: {e}\")\n        return \"failed\"\n\
          \n"
        image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-devel
    exec-run-alignment:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - run_alignment
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'mlflow' &&\
          \ \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef run_alignment(\n    sft_adapter_path: str,\n    dataset_path:\
          \     str,\n    output_dir:       str,\n    method:           str,\n   \
          \ num_epochs:       int   = 3,  # Increased from 1\n    learning_rate: \
          \   float = 5e-5,\n    metrics:          Output[Metrics] = None,\n) -> str:\n\
          \    import subprocess, sys\n    import mlflow\n\n    # Unique output dir\
          \ for each method to avoid conflicts in parallel run\n    method_output_dir\
          \ = f\"{output_dir}/{method}\"\n\n    mlflow.set_experiment(\"arabic-medical-alignment\"\
          )\n    with mlflow.start_run(run_name=method):\n        mlflow.log_params({\"\
          method\": method, \"epochs\": num_epochs, \"lr\": learning_rate})\n\n  \
          \      cmd = [\n            sys.executable, \"-m\", \"app.interfaces.cli.main\"\
          , \"align\",\n            \"--sft-path\", sft_adapter_path,\n          \
          \  \"--dataset-path\", dataset_path,\n            \"--output-dir\", method_output_dir,\n\
          \            \"--method\", method,\n            \"--num-epochs\", str(num_epochs),\n\
          \            \"--learning-rate\", str(learning_rate),\n        ]\n     \
          \   result = subprocess.run(cmd, capture_output=True, text=True)\n     \
          \   if result.returncode != 0:\n            print(f\"Warning: {method} failed:\\\
          n{result.stderr}. Returning empty path.\")\n            return \"\"\n\n\
          \        if metrics:\n            for line in result.stdout.splitlines():\n\
          \                if \"reward_margin\" in line.lower():\n               \
          \     try:\n                        margin = float(line.split(\":\")[-1].strip())\n\
          \                        metrics.log_metric(f\"{method}_reward_margin\"\
          , margin)\n                        mlflow.log_metric(\"reward_margin\",\
          \ margin)\n                    except ValueError:\n                    \
          \    pass\n\n    return method_output_dir\n\n"
        image: arabic-medical-llm/trainer:latest
