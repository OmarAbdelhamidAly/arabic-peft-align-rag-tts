  comp-merge-model:
    executorLabel: exec-merge-model
    inputDefinitions:
      parameters:
        adapter_path:
          parameterType: STRING
        output_dir:
          parameterType: STRING
        save_method:
          defaultValue: merged_16bit
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-push-to-huggingface:
