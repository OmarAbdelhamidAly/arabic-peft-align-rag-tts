deploymentSpec:
  executors:
    exec-merge-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - merge_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'peft' 'transformers'\
          \ 'accelerate' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef merge_model(\n    adapter_path: str,\n    output_dir:   str,\n\
          \    base_model:   str = \"unsloth/qwen2.5-3b-instruct-unsloth-bnb-4bit\"\
          ,\n    save_method:  str = \"merged_16bit\",\n) -> str:\n    import os\n\
          \n    if not adapter_path or not os.path.exists(adapter_path):\n       \
          \ raise ValueError(f\"[merge_model] Invalid adapter path: {adapter_path}\"\
          )\n\n    os.makedirs(output_dir, exist_ok=True)\n    print(f\"[merge_model]\
          \ Merging {adapter_path} \u2192 {output_dir}\")\n\n    try:\n        from\
          \ unsloth import FastLanguageModel\n        from peft import PeftModel\n\
          \n        model, tokenizer = FastLanguageModel.from_pretrained(\n      \
          \      model_name=base_model,\n            max_seq_length=4096,\n      \
          \      dtype=None,\n            load_in_4bit=True,\n        )\n        model\
          \ = PeftModel.from_pretrained(model, adapter_path)\n        model = model.merge_and_unload()\n\
          \        model.save_pretrained(output_dir, safe_serialization=True)\n  \
          \      tokenizer.save_pretrained(output_dir)\n        print(f\"[merge_model]\
          \ Saved merged model \u2192 {output_dir}\")\n\n    except Exception as exc:\n\
          \        print(f\"[merge_model] Merge failed: {exc}\")\n        # Write\
          \ a sentinel so the pipeline can continue\n        with open(os.path.join(output_dir,\
          \ \"merge_failed.txt\"), \"w\") as f:\n            f.write(str(exc))\n\n\
          \    return output_dir\n\n"
        image: arabic-medical-llm/trainer:latest
    exec-push-to-huggingface:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - push_to_huggingface
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'huggingface_hub'\
          \ && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef push_to_huggingface(\n    merged_model_path: str,\n    repo_id:\
          \           str,\n    hf_token:          str,\n) -> str:\n    from huggingface_hub\
          \ import HfApi\n\n    if not hf_token or hf_token == \"YOUR_HF_TOKEN\":\n\
          \        print(\"[push_to_huggingface] No valid HF token \u2014 skipping.\"\
          )\n        return \"skipped\"\n\n    api = HfApi(token=hf_token)\n    try:\n\
          \        api.create_repo(repo_id=repo_id, exist_ok=True)\n        api.upload_folder(\n\
          \            folder_path=merged_model_path,\n            repo_id=repo_id,\n\
          \            repo_type=\"model\",\n        )\n        url = f\"https://huggingface.co/{repo_id}\"\
          \n        print(f\"[push_to_huggingface] Pushed \u2192 {url}\")\n      \
          \  return url\n    except Exception as exc:\n        print(f\"[push_to_huggingface]\
          \ Failed: {exc}\")\n        return \"failed\"\n\n"
        image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-devel
    exec-run-alignment:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - run_alignment
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'mlflow' 'papermill'\
          \ 'ipykernel' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef run_alignment(\n    sft_adapter_path: str,\n    dataset_path:\
          \     str,\n    output_dir:       str,\n    method:           str,\n   \
          \ num_epochs:       int   = 3,\n    learning_rate:    float = 5e-5,\n  \
          \  max_steps:         int   = 10,\n    metrics:          Output[Metrics]\
          \ = None,\n) -> str:\n    import os, subprocess\n    import mlflow\n\n \
          \   workspace         = os.environ.get(\"WORKSPACE_PATH\", \"/workspace\"\
          )\n    method_output_dir = os.path.join(output_dir, method)\n    os.makedirs(method_output_dir,\
          \ exist_ok=True)\n\n    # RLOO has a two-part notebook; we run part-1 (reward\
          \ model) in automated pipelines\n    if method == \"rloo\":\n        notebook_in\
          \ = os.path.join(\n            workspace, \"experiments\", \"02_post_training\"\
          ,\n            \"train_rloo_part1_reward_model.ipynb\",\n        )\n   \
          \ else:\n        notebook_in = os.path.join(\n            workspace, \"\
          experiments\", \"02_post_training\",\n            f\"train_{method}.ipynb\"\
          ,\n        )\n\n    notebook_out = os.path.join(method_output_dir, f\"train_{method}_executed.ipynb\"\
          )\n\n    mlflow.set_tracking_uri(os.environ.get(\"MLFLOW_TRACKING_URI\"\
          , \"http://localhost:5000\"))\n    mlflow.set_experiment(\"arabic-medical-alignment\"\
          )\n\n    with mlflow.start_run(run_name=method):\n        mlflow.log_params({\n\
          \            \"method\":  method,\n            \"epochs\":  num_epochs,\n\
          \            \"lr\":      learning_rate,\n        })\n\n        cmd = [\n\
          \            \"papermill\", notebook_in, notebook_out,\n            \"-p\"\
          , \"SFT_ADAPTER_PATH\", sft_adapter_path,\n            \"-p\", \"DATASET_PATH\"\
          ,     dataset_path,\n            \"-p\", \"OUTPUT_DIR\",       method_output_dir,\n\
          \            \"-p\", \"NUM_EPOCHS\",       str(num_epochs),\n          \
          \  \"-p\", \"LEARNING_RATE\",    str(learning_rate),\n            \"-p\"\
          , \"MAX_STEPS\",        str(max_steps),\n        ]\n        print(f\"[run_alignment:{method}]\
          \ Running: {' '.join(cmd)}\")\n        result = subprocess.run(cmd, capture_output=True,\
          \ text=True)\n\n        if result.returncode != 0:\n            print(f\"\
          [run_alignment:{method}] Warning \u2014 failed:\\n{result.stderr}\")\n \
          \           return \"\"   # Non-fatal: other methods may still succeed\n\
          \n        # Parse reward_margin and log it\n        for line in result.stdout.splitlines():\n\
          \            if \"reward_margin\" in line.lower():\n                try:\n\
          \                    margin = float(line.split(\":\")[-1].strip())\n   \
          \                 mlflow.log_metric(\"reward_margin\", margin)\n       \
          \             if metrics:\n                        metrics.log_metric(f\"\
          {method}_reward_margin\", margin)\n                except ValueError:\n\
          \                    pass\n\n    print(f\"[run_alignment:{method}] Done\
          \ \u2192 {method_output_dir}\")\n    return method_output_dir\n\n"
        image: arabic-medical-llm/trainer:latest
