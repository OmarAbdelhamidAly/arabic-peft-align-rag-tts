# PIPELINE DEFINITION
# Name: arabic-medical-llm-training-papermill
# Description: E2E Pipeline: SFT -> Parallel Alignments -> Select Best -> Merge -> Push to HF
# Inputs:
#    align_max_steps: int [Default: 10.0]
#    alignment_output: str [Default: '/outputs/alignments']
#    base_model: str [Default: 'unsloth/qwen2.5-3b-instruct-unsloth-bnb-4bit']
#    dataset_path: str [Default: '/data/raw/alignment']
#    hf_repo_id: str [Default: 'YourUsername/Arabic-Medical-LLM-Qwen-3B']
#    hf_token: str [Default: 'YOUR_HF_TOKEN']
#    merged_output_dir: str [Default: '/outputs/merged_model_16bit']
#    sft_max_steps: int [Default: 100.0]
#    sft_output_dir: str [Default: '/outputs/sft_adapter']
# Outputs:
#    run-alignment-2-metrics: system.Metrics
#    run-alignment-3-metrics: system.Metrics
#    run-alignment-4-metrics: system.Metrics
#    run-alignment-5-metrics: system.Metrics
#    run-alignment-6-metrics: system.Metrics
#    run-alignment-metrics: system.Metrics
#    run-sft-metrics: system.Metrics
