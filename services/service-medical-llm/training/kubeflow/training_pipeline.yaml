          \ = None,\n) -> str:\n    import os, subprocess, sys\n    import mlflow\n\
          \n    # Support local Windows runs via WORKSPACE_PATH env var\n    workspace\
          \    = os.environ.get(\"WORKSPACE_PATH\", \"/workspace\")\n    notebook_in\
          \  = os.path.join(workspace, \"experiments\", \"01_sft\", \"train_sft_optimized.ipynb\"\
          )\n    os.makedirs(output_dir, exist_ok=True)\n    notebook_out = os.path.join(output_dir,\
          \ \"train_sft_executed.ipynb\")\n\n    mlflow.set_tracking_uri(os.environ.get(\"\
          MLFLOW_TRACKING_URI\", \"http://localhost:5000\"))\n    mlflow.set_experiment(\"\
